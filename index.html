*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.2rem;font-weight:700;color:#f1f5f9}
.header .upd{font-size:.75rem;color:#64748b}
.container{max-width:1400px;margin:0 auto;padding:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:20px}
.kpi{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-2px);border-color:#475569}
.kpi.active{border-color:var(--c);box-shadow:0 0 0 1px var(--c)}
.kpi-lbl{font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.kpi-val{font-size:2rem;font-weight:800;color:var(--c);line-height:1}
.kpi-bar{position:absolute;bottom:0;left:0;height:3px;width:100%;background:var(--c);opacity:.6}
.prog-wrap{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px 20px;margin-bottom:20px}
.prog-bar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:10px}
.prog-seg{height:100%;transition:width .3s}
.prog-legend{display:flex;gap:20px;flex-wrap:wrap}
.prog-leg-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#94a3b8}
.prog-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-title{font-size:.875rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.filter-wrap{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:20px}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pill{background:#0f172a;border:1px solid #334155;border-radius:20px;padding:6px 14px;font-size:.78rem;cursor:pointer;transition:all .2s;color:#94a3b8}
.pill:hover{border-color:#3b82f6;color:#e2e8f0}
.pill.active{background:#3b82f620;border-color:#3b82f6;color:#3b82f6}
.pill-cnt{font-size:.68rem;opacity:.7}
.srch{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.srch input{background:none;border:none;outline:none;color:#e2e8f0;font-size:.9rem;flex:1}
.srch input::placeholder{color:#475569}
.acc-grp{background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:12px;overflow:hidden}
.acc-hdr{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .2s}
.acc-hdr:hover{background:#243044}
.acc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.acc-ttl{font-weight:600;font-size:.95rem;flex:1}
.acc-cnt{font-size:.78rem;color:#64748b;background:#0f172a;border-radius:20px;padding:2px 10px}
.acc-chv{color:#64748b;transition:transform .2s;font-size:.72rem}
.acc-hdr.open .acc-chv{transform:rotate(180deg)}
.acc-body{display:none}
.acc-body.open{display:block}
.ttbl{width:100%;border-collapse:collapse}
.ttbl th{padding:10px 14px;font-size:.68rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #334155;text-align:left;background:#162032}
.trow{border-bottom:1px solid #1e2d3d;cursor:pointer;transition:background .15s}
.trow:hover{background:#243044}
.trow td{padding:10px 14px;font-size:.82rem;vertical-align:middle}
.trow.out{display:none}
.bdg{display:inline-block;font-size:.63rem;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.bdg-imp{background:#ef444420;color:#ef4444;border:1px solid #ef444440}
.bdg-nimp{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40}
.det-row{background:#162032;border-bottom:1px solid #1e2d3d;display:none}
.det-row.open{display:table-row}
.det-in{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.det-f{font-size:.8rem}
.det-l{color:#64748b;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.det-v{color:#e2e8f0}
.det-v.resp-v{color:#94a3b8}
.st-val{font-size:.75rem;white-space:nowrap}
.st-diff{color:#f97316;font-weight:600}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.container{padding:12px}}
</style>

: "ENGETECNICA", "resposta": "Trabalho Necessário", "status": "pendente", "status_raw": "Trabalho Necessário", "prioridade": "Alta", "classif": "Civil", "grupo": "Civil", "identif": "Casa de relé"}, {"num": "307", "titulo": "Caixa de comando - 147624DS01C", "tipo": "Não Impeditivo", "desc": "Porta interna com pino de fixação solto, ocasionando arraste e travamento na borracha de vedação durante o fechamento.", "empresa": "SIEMENS", "resposta": "Trabalho Necessário", "status": "pendente", "status_raw": "Trabalho Necessário", "prioridade": "Média", "classif": "Eletromecânico", "grupo": "Eletromecânico", "identif": "C1"}, {"num": "308", "titulo": "Caixa de comando - 147624DS02C", "tipo": "Não Impeditivo", "desc": "Porta interna com pino de fixação solto, ocasionando arraste e travamento na borracha de vedação durante o fechamento.", "empresa": "SIEMENS", "resposta": "Trabalho Necessário", "status": "pendente", "status_raw": "Trabalho Necessário", "prioridade": "Média", "classif": "Eletromecânico", "grupo": "Eletromecânico", "identif": "C1"}, {"num": "309", "titulo": "Chave catraca - NS 147624CB01", "tipo": "Não Impeditivo", "desc": "Faltando a chave catraca da caixa de comando do equipamento de número de série: 147624CB01", "empresa": "SIEMENS", "resposta": "Trabalho Necessário", "status": "pendente", "status_raw": "Trabalho Necessário", "prioridade": "Média", "classif": "Eletromecânico", "grupo": "Eletromecânico", "identif": "C1"}];
let aS='all',aG='all',aQ='';
const SI={
  pendente:{lbl:'Trabalho Necessario',c:'#f59e0b'},
  pronto:{lbl:'Pronto para Fechar',c:'#06b6d4'},
  nao_aceito:{lbl:'Nao Aceito',c:'#ef4444'},
  concluido:{lbl:'Fechado',c:'#22c55e'}
};
const GO=['pendente','pronto','nao_aceito','concluido'];

function buildPills(){
  const gs={};
  T.forEach(t=>{
    const g=t.grupo||'Sem Categoria';
    if(!gs[g])gs[g]={tot:0,pend:0};
    gs[g].tot++;
    if(t.status!=='concluido')gs[g].pend++;
  });
  const keys=Object.keys(gs).sort((a,b)=>gs[b].pend-gs[a].pend);
  const cont=document.getElementById('PILLS');
  const ap=document.createElement('div');
  ap.className='pill active';ap.id='P-all';ap.textContent='Todos';
  ap.onclick=()=>fltG('all');cont.appendChild(ap);
  keys.forEach(g=>{
    const safe=g.replace(/[^a-zA-Z0-9]/g,'_');
    const p=document.createElement('div');
    p.className='pill';p.id='P-'+safe;
    p.innerHTML=`${g} <span class="pill-cnt">${gs[g].pend} pend. / ${gs[g].tot}</span>`;
    p.onclick=()=>fltG(g);cont.appendChild(p);
  });
}

function buildAcc(){
  const cont=document.getElementById('ACC');cont.innerHTML='';
  GO.forEach(st=>{
    const tasks=T.filter(t=>t.status===st);
    const info=SI[st];
    const isOpen=st!=='concluido';
    const grp=document.createElement('div');grp.className='acc-grp';grp.id='G-'+st;
    const hdr=document.createElement('div');
    hdr.className='acc-hdr'+(isOpen?' open':'');
    hdr.innerHTML=`<div class="acc-dot" style="background:${info.c}"></div>
      <div class="acc-ttl">${info.lbl}</div>
      <div class="acc-cnt" id="C-${st}">${tasks.length} / ${tasks.length}</div>
      <div class="acc-chv">&#9660;</div>`;
    const body=document.createElement('div');
    body.className='acc-body'+(isOpen?' open':'');body.id='B-'+st;
    hdr.onclick=()=>{hdr.classList.toggle('open');body.classList.toggle('open');};
    const tbl=document.createElement('table');tbl.className='ttbl';
    tbl.innerHTML=`<thead><tr>
      <th style="width:50px">#</th>
      <th>Titulo</th>
      <th style="width:130px">Classificacao</th>
      <th style="width:130px">Empresa Resp.</th>
      <th style="width:90px">Tipo</th>
      <th style="width:140px">Status (oficial)</th>
      <th style="width:140px">Resposta Resp.</th>
    </tr></thead>`;
    const tb=document.createElement('tbody');tb.id='TB-'+st;
    tasks.forEach((t,i)=>{
      const did='D-'+st+'-'+i;
      const bc=t.tipo&&t.tipo.toLowerCase().includes('imped')?'bdg-imp':'bdg-nimp';
      const diff=t.status_raw&&t.resposta&&t.status_raw.trim().toLowerCase()!==t.resposta.trim().toLowerCase();
      const tr=document.createElement('tr');
      tr.className='trow';
      tr.dataset.titulo=(t.titulo+' '+t.desc+' '+t.empresa+' '+t.identif+' '+t.classif).toLowerCase();
      tr.dataset.grupo=t.grupo||'Sem Categoria';
      tr.dataset.status=t.status;
      tr.innerHTML=`
        <td style="color:#64748b;font-size:.72rem">${t.num}</td>
        <td>${t.titulo||t.desc||'—'}</td>
        <td style="color:#94a3b8;font-size:.78rem">${t.classif||'—'}</td>
        <td style="color:#64748b;font-size:.78rem">${t.empresa||'—'}</td>
        <td><span class="bdg ${bc}">${t.tipo||'—'}</span></td>
        <td><span class="st-val">${t.status_raw||'—'}</span></td>
        <td><span class="st-val ${diff?'st-diff':''}">${t.resposta||'—'}</span></td>`;
      tr.onclick=()=>{const d=document.getElementById(did);if(d)d.classList.toggle('open');};
      const det=document.createElement('tr');
      det.className='det-row';det.id=did;
      const fields=[
        ['Empresa Responsavel',t.empresa||'—',''],
        ['Resposta',t.resposta||'—','resp-v'],
        ['Prioridade',t.prioridade||'—',''],
        ['Identificacao',t.identif||'—',''],
        ['Descricao',t.desc||'—',''],
      ];
      const inner=fields.map(([l,v,cls])=>`<div class="det-f"><div class="det-l">${l}</div><div class="det-v ${cls}">${v}</div></div>`).join('');
      det.innerHTML=`<td colspan="7"><div class="det-in">${inner}</div></td>`;
      tb.appendChild(tr);tb.appendChild(det);
    });
    tbl.appendChild(tb);body.appendChild(tbl);
    grp.appendChild(hdr);grp.appendChild(body);cont.appendChild(grp);
  });
}

function fltS(s){
  aS=s;
  document.querySelectorAll('.kpi').forEach(k=>k.classList.remove('active'));
  document.getElementById('K-'+s)?.classList.add('active');
  applyF();
}

function fltG(g){
  aG=g;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  const safe=g==='all'?'all':g.replace(/[^a-zA-Z0-9]/g,'_');
  document.getElementById('P-'+safe)?.classList.add('active');
  applyF();
}

function applyF(){
  aQ=document.getElementById('SEARCH').value.toLowerCase();
  const cnt={pendente:0,pronto:0,nao_aceito:0,concluido:0};
  const tot={pendente:0,pronto:0,nao_aceito:0,concluido:0};
  document.querySelectorAll('.trow').forEach(row=>{
    const s=row.dataset.status,g=row.dataset.grupo,txt=row.dataset.titulo;
    tot[s]=(tot[s]||0)+1;
    const ok=(aS==='all'||s===aS)&&(aG==='all'||g===aG)&&(!aQ||txt.includes(aQ));
    row.classList.toggle('out',!ok);
    if(ok)cnt[s]=(cnt[s]||0)+1;
  });
  GO.forEach(s=>{const el=document.getElementById('C-'+s);if(el)el.textContent=(cnt[s]||0)+' / '+(tot[s]||0);});
}

buildPills();buildAcc();
document.getElementById('K-all').classList.add('active');
</script>
